<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AVYRA Perfumes</title>

<link rel="stylesheet" href="styles.css">

</head>

<body>

<header class="topbar">

<div class="brand">AVYRA</div>

<nav class="menu">

<button id="favoritesBtn">
❤ <span id="favoritesCount">0</span>
</button>

<button id="cartBtn">
👜 <span id="cartCount">0</span>
</button>

</nav>

</header>

<main>

<h1>Perfumes em destaque</h1>

<section class="products">

<!-- FOGO -->

<div class="product-card" data-name="FOGO" data-price="59.99">

<img src="assets/perfumes/fogo.svg" class="product-image">

<h3>FOGO</h3>

<p>Perfume intenso e marcante</p>

<button class="buy-btn">Comprar agora</button>

<button class="bag-btn">Adicionar à sacola</button>

</div>

<!-- AURA -->

<div class="product-card" data-name="AURA" data-price="59.99">

<img src="assets/perfumes/aura.svg" class="product-image">

<h3>AURA</h3>

<p>Perfume delicado e feminino</p>

<button class="buy-btn">Comprar agora</button>

<button class="bag-btn">Adicionar à sacola</button>

</div>

<!-- MARÉ -->

<div class="product-card" data-name="MARÉ" data-price="51.99">

<img src="assets/perfumes/mare.svg" class="product-image">

<h3>MARÉ</h3>

<p>Perfume fresco e energético</p>

<button class="buy-btn">Comprar agora</button>

<button class="bag-btn">Adicionar à sacola</button>

</div>

<!-- NOITE -->

<div class="product-card" data-name="NOITE" data-price="79.99">

<img src="assets/perfumes/noite.svg" class="product-image">

<h3>NOITE</h3>

<p>Perfume elegante e misterioso</p>

<button class="buy-btn">Comprar agora</button>

<button class="bag-btn">Adicionar à sacola</button>

</div>

</section>

<section class="newsletter">

<h2>Receba promoções</h2>

<form class="subscribe-form">

<input type="email" placeholder="Seu email">

<button type="submit">Cadastrar</button>

</form>

</section>

</main>

<script src="script.js"></script>

</body>
</html>
